steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/haraka-api', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/haraka-api']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'haraka-api'
      - '--image=gcr.io/$PROJECT_ID/haraka-api'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--cpu-always-allocated'
      - '--timeout=300'
      - '--memory=1Gi'

images:
  - 'gcr.io/$PROJECT_ID/haraka-api'
