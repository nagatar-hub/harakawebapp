steps:
  # ============================================================
  # API: ビルド → プッシュ → デプロイ
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-api', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-api']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'haraka-api'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-api'
      - '--region=asia-northeast1'
      - '--platform=managed'
      - '--no-cpu-throttling'
      - '--timeout=300'
      - '--memory=1Gi'
      - '--update-env-vars=TZ=Asia/Tokyo'

  # ============================================================
  # Job: ビルド → プッシュ → Cloud Run Jobs 更新
  # ============================================================
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'packages/job/Dockerfile'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-job'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-job']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'haraka-sync'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-job'
      - '--region=asia-northeast1'
      - '--task-timeout=1800'
      - '--memory=2Gi'
      - '--update-env-vars=JOB_NAME=sync,TRIGGER=scheduler,TZ=Asia/Tokyo'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'haraka-generate'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-job'
      - '--region=asia-northeast1'
      - '--task-timeout=3600'
      - '--memory=2Gi'
      - '--update-env-vars=JOB_NAME=generate,TRIGGER=scheduler,TZ=Asia/Tokyo'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'haraka-watchdog'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-job'
      - '--region=asia-northeast1'
      - '--task-timeout=5400'
      - '--memory=2Gi'
      - '--update-env-vars=JOB_NAME=watchdog,TRIGGER=watchdog,TZ=Asia/Tokyo'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-api'
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/haraka-job'
